<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="CSS/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="clockContainer">
      <h1>World Clock</h1>
      <select id="countrySelect">
        <option value="">--Select a country--</option>
        <option value="America/New_York">United States (New York)</option>
        <option value="Europe/London">United Kingdom (London)</option>
        <option value="Europe/Paris">France (Paris)</option>
        <option value="Asia/Tokyo">Japan (Tokyo)</option>
        <option value="Australia/Sydney">Australia (Sydney)</option>
      </select>
      <div class="cities">
        <div>
          <h2>New York</h2>
          <div class="date">June 28, 2026</div>
        </div>
        <div class="time">10:30:45 <small>AM</small></div>
      </div>
      <div class="cities">
        <div>
          <h2>London</h2>
          <div class="date">June 28, 2026</div>
        </div>
        <div class="time">10:30:45 <small>AM</small></div>
      </div>
      <div class="cities">
        <div>
          <h2>Paris</h2>
          <div class="date">June 28, 2026</div>
        </div>
        <div class="time">10:30:45 <small>AM</small></div>
      </div>
    </div>

    <footer>
      This project was coded by<a
        href="https://github.com/made642"
        target="_blank"
        >Maridel Cañada</a
      >
      and is
      <a href="https://github.com/made642/WorldClock" target="_blank">
        on GitHub</a
      >
      and
      <a href="https://myworldclockapplication.netlify.app/" target="_blank"
        >hosted on Netlify</a
      >
    </footer>
    <script src="Javascript/index.js"></script>
  </body>
</html>
